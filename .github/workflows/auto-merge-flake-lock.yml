name: Auto-merge flake.lock updates

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'update_flake_lock_action' &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.draft == false
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify PR only updates flake.lock
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          if [ "$changed_files" != "flake.lock" ]; then
            printf 'Unexpected files changed:\n%s\n' "$changed_files" >&2
            exit 1
          fi

      - name: Enable pull request auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash --delete-branch
