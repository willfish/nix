name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-linux:
    name: Nix Linux
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # v3.21.0
        with:
          determinate: false
          extra-conf: |
            eval-cores = 1

      - name: Check flake evaluation
        run: nix flake check --no-build

      - name: Check Linux Home Manager activation package closure
        run: nix build .#homeConfigurations.william-linux.activationPackage --dry-run

  nix-darwin:
    name: Nix Darwin
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # v3.21.0
        with:
          determinate: false

      - name: Check Darwin Home Manager activation package closure
        run: nix build .#homeConfigurations.william-darwin.activationPackage --dry-run
