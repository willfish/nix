name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-linux:
    name: Nix Linux
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0

      - name: Check flake evaluation
        run: nix flake check --no-build

      - name: Check Linux Home Manager activation package closure
        run: nix build .#homeConfigurations.william-linux.activationPackage --dry-run

  nix-darwin:
    name: Nix Darwin
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0

      - name: Check Darwin Home Manager activation package closure
        run: nix build .#homeConfigurations.william-darwin.activationPackage --dry-run
